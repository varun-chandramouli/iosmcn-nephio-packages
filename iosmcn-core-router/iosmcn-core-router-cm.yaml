kind: ConfigMap
metadata: # kpt-merge: iosmcncore/iosmcncore-values
  name: iosmcn-core-router-values
  namespace: iosmcncore
  annotations:
    internal.kpt.dev/upstream-identifier: '|ConfigMap|iosmcncore|iosmcncore-values'
apiVersion: v1
data:
  values.yaml: |+
    images:
      repository: "" #default docker hub
      tags:
        router: wbitt/network-multitool:minimal
    pullPolicy: IfNotPresent

    resources:
      enabled: false
      router:
        requests:
          cpu: 0.5
          memory: 256Mi
        limits:
          cpu: 0.5
          memory: 256Mi

    config:
      router:
        deploy: true
        cni: "sriov"
        # resourceName is valid only when sriov cni is used
        resourceName: "intel.com/intel_sriov_netdevice"
        # dataIface is required when macvlan cni is used
        # dataIface: "eno1"
        routes:
        - to: "172.250.0.0/16"
          via: "192.168.250.3"
        interfaces:
        - name: core
          ip: "192.168.250.1/24"
        - name: access
          ip: "192.168.252.1/24"
        - name: ran
          ip: "192.168.251.1/24"
